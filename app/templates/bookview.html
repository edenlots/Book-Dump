<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../static/styles.css">
    <title>View Book - Book Dumps</title>
</head>
<body>
    <!-- Header -->
    <header>
        <h1>📖 View Book</h1>
        <nav>
            <ul>
                <li><a href="{{ url_for('main.dashboard') }}">← Dashboard</a></li>
                <li><a href="{{ url_for('main.books') }}">All Books</a></li>
                <li><a href="{{ url_for('main.search') }}">Search</a></li>
            </ul>
        </nav>
    </header>

    <div class="container-lg">
        <!-- Book Details Card -->
        <div class="card mt-4">
            <div class="card-header">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h2>📚 {{ book[1] }}</h2>
                    <span class="badge" style="background-color: var(--primary-color); color: white; padding: 0.5rem 1rem; border-radius: 4px;">
                        PDF Available
                    </span>
                </div>
            </div>
            <div class="card-body">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem;">
                    <div>
                        <p style="font-weight: bold; color: var(--text-muted); font-size: 0.85rem; margin-bottom: 0.25rem;">Author</p>
                        <p style="font-size: 1.1rem;">{{ book[2] }}</p>
                    </div>
                    <div>
                        <p style="font-weight: bold; color: var(--text-muted); font-size: 0.85rem; margin-bottom: 0.25rem;">Genre</p>
                        <span class="badge" style="background-color: #e0e7ff; color: #3730a3; padding: 0.25rem 0.75rem; border-radius: 4px;">{{ book[5] if book|length > 5 else 'Unknown' }}</span>
                    </div>
                    <div>
                        <p style="font-weight: bold; color: var(--text-muted); font-size: 0.85rem; margin-bottom: 0.25rem;">Year</p>
                        <p style="font-size: 1.1rem;">{{ book[4] if book|length > 4 else 'N/A' }}</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- PDF Viewer -->
        <div class="card mt-4">
            <div class="card-header">
                <h2>📄 PDF Viewer</h2>
            </div>
            <div class="card-body">
                <div style="background-color: #f3f4f6; border-radius: 8px; overflow: hidden; height: 600px;">
                    <iframe 
                        src="{{ url_for('main.view_file', filename=book[3].split('/')[-1]) }}" 
                        style="width: 100%; height: 100%; border: none;"
                        title="Book PDF Viewer">
                    </iframe>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="card mt-4">
            <div class="card-body" style="display: flex; gap: 1rem; flex-wrap: wrap;">
                <a href="{{ url_for('main.view_file', filename=book[3].split('/')[-1]) }}" download class="btn btn-primary">⬇️ Download PDF</a>
                <a href="{{ url_for('main.books') }}" class="btn btn-secondary">← Back to Books</a>
            </div>
        </div>
    </div>

</body>
</html>
